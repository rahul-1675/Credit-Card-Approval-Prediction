<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check Eligibility – CredAI Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6c63ff;
      --accent:  #00d4ff;
      --dark:    #0d0e1a;
      --card:    rgba(255, 255, 255, 0.05);
      --text:    #e8eaf6;
      --muted:   #9fa8da;
      --border:  rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 80% 20%, #1a237e 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, #3a1c71 0%, transparent 60%),
                  linear-gradient(135deg, #0d0e1a 0%, #11123a 100%);
      z-index: -1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 4rem;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }
    .nav-btn {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      transition: color .2s;
    }
    .nav-btn:hover { color: #fff; }

    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 900px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    .form-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .form-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .input-box {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-box label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-box input, .input-box select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-box input:focus, .input-box select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
    }

    .input-box select option {
      background: #11123a;
      color: #fff;
    }

    .btn-submit {
      grid-column: span 2;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      padding: 1rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    @media (max-width: 768px) {
      .btn-submit {
        grid-column: span 1;
      }
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">CredAI Pulse</a>
  <a href="/" class="nav-btn">&larr; Back to Home</a>
</nav>

<div class="container">
  <div class="form-card">
    <div class="form-header">
      <h1>Credit Card Eligibility Check</h1>
      <p>Fill out the applicant details below to evaluate approval eligibility</p>
    </div>

    <form action="/predict" method="POST" class="form-grid">
      <!-- 1. Gender -->
      <div class="input-box">
        <label for="CODE_GENDER">Gender</label>
        <select id="CODE_GENDER" name="CODE_GENDER" required>
          <option value="0">Female</option>
          <option value="1">Male</option>
        </select>
      </div>

      <!-- 2. Own Car -->
      <div class="input-box">
        <label for="FLAG_OWN_CAR">Own Car or Not</label>
        <select id="FLAG_OWN_CAR" name="FLAG_OWN_CAR" required>
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <!-- 3. Own Realty -->
      <div class="input-box">
        <label for="FLAG_OWN_REALTY">Own Realstate</label>
        <select id="FLAG_OWN_REALTY" name="FLAG_OWN_REALTY" required>
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>
      </div>

      <!-- 4. Total Annual Income -->
      <div class="input-box">
        <label for="AMT_INCOME_TOTAL">Total Annual Income</label>
        <input type="number" step="any" id="AMT_INCOME_TOTAL" name="AMT_INCOME_TOTAL" placeholder="e.g. 50000" required/>
      </div>

      <!-- 5. Income Type -->
      <div class="input-box">
        <label for="NAME_INCOME_TYPE">Type of Income</label>
        <select id="NAME_INCOME_TYPE" name="NAME_INCOME_TYPE" required>
          <option value="0">Commercial Associate</option>
          <option value="1">Pensioner</option>
          <option value="2">State servant</option>
          <option value="3">Student</option>
          <option value="4">Working</option>
        </select>
      </div>

      <!-- 6. Education -->
      <div class="input-box">
        <label for="NAME_EDUCATION_TYPE">Education</label>
        <select id="NAME_EDUCATION_TYPE" name="NAME_EDUCATION_TYPE" required>
          <option value="0">Academic degree</option>
          <option value="1">Higher education</option>
          <option value="2">Incomplete higher</option>
          <option value="3">Lower secondary</option>
          <option value="4">Secondary / secondary special</option>
        </select>
      </div>

      <!-- 7. Family Status -->
      <div class="input-box">
        <label for="NAME_FAMILY_STATUS">Family Status</label>
        <select id="NAME_FAMILY_STATUS" name="NAME_FAMILY_STATUS" required>
          <option value="0">Civil marriage</option>
          <option value="1">Married</option>
          <option value="2">Separated</option>
          <option value="3">Single / not married</option>
          <option value="4">Widow</option>
        </select>
      </div>

      <!-- 8. Housing Type -->
      <div class="input-box">
        <label for="NAME_HOUSING_TYPE">Type of Housing</label>
        <select id="NAME_HOUSING_TYPE" name="NAME_HOUSING_TYPE" required>
          <option value="0">Co-op apartment</option>
          <option value="1">House / apartment</option>
          <option value="2">Municipal apartment</option>
          <option value="3">Office apartment</option>
          <option value="4">Rented apartment</option>
          <option value="5">With parents</option>
        </select>
      </div>

      <!-- 9. Days Birth -->
      <div class="input-box">
        <label for="DAYS_BIRTH">Days Birth</label>
        <input type="number" id="DAYS_BIRTH" name="DAYS_BIRTH" placeholder="e.g. 15000" required/>
      </div>

      <!-- 10. Days Employed -->
      <div class="input-box">
        <label for="DAYS_EMPLOYED">Days Employed</label>
        <input type="number" id="DAYS_EMPLOYED" name="DAYS_EMPLOYED" placeholder="e.g. 2000" required/>
      </div>

      <!-- 11. Family Members -->
      <div class="input-box">
        <label for="CNT_FAM_MEMBERS">Family Members</label>
        <input type="number" id="CNT_FAM_MEMBERS" name="CNT_FAM_MEMBERS" placeholder="e.g. 2" required/>
      </div>

      <!-- 12. EMI Paid Off -->
      <div class="input-box">
        <label for="EMI_PAID_OFF">EMI Paid Off</label>
        <input type="number" id="EMI_PAID_OFF" name="EMI_PAID_OFF" placeholder="e.g. 4" required/>
      </div>

      <!-- 13. EMI of Pastdues -->
      <div class="input-box">
        <label for="EMI_PASTDUES">EMI of Pastdues</label>
        <input type="number" id="EMI_PASTDUES" name="EMI_PASTDUES" placeholder="e.g. 1" required/>
      </div>

      <!-- 14. Number of Loans -->
      <div class="input-box">
        <label for="NUMBER_OF_LOANS">Number of Loans</label>
        <input type="number" id="NUMBER_OF_LOANS" name="NUMBER_OF_LOANS" placeholder="e.g. 2" required/>
      </div>

      <button type="submit" class="btn-submit">Predict</button>
    </form>
  </div>
</div>

<footer>
  <p>CredAI Pulse &nbsp;|&nbsp; Credit Card Approval Prediction System</p>
</footer>

</body>
</html>
